# _config.yml

# -----------------------------------------------
# 기본 정보
# -----------------------------------------------
theme: jekyll-theme-chirpy

title: "잠탱이의 AI 연구소"
tagline: "AI 개발자로 성장하는 과정을 기록합니다 🤖"
description: >-
  Gemini, FastAPI, LLM 등 AI 개발 경험을 기록하는 블로그입니다.
  삽질 후기부터 튜토리얼까지, 친근하게 공유합니다.

url: "https://jaedark.github.io"
baseurl: ""

# -----------------------------------------------
# 언어 & 시간대
# -----------------------------------------------
lang: ko-KR
timezone: Asia/Seoul

# -----------------------------------------------
# 작성자 정보
# -----------------------------------------------
author:
  name: 잠탱이
  url: https://jaedark.github.io

# -----------------------------------------------
# 소셜 링크 (있는 것만 채우기)
# -----------------------------------------------
github:
  username: jaedark

# twitter:
#   username:

# -----------------------------------------------
# 소셜 미리보기 이미지 (선택)
# -----------------------------------------------
social:
  name: 잠탱이
  email: jaedark@gmail.com           # 이메일 있으면 입력
  links:
    - https://github.com/jaedark

# -----------------------------------------------
# 애널리틱스 (나중에 구글 애널리틱스 연동시 입력)
# -----------------------------------------------
google_analytics:
  id: "G-1K9WEVZ8EN"              # 예: G-XXXXXXXXXX
  gt_js_url: "https://www.googletagmanager.com/gtag/js"

# -----------------------------------------------
# 댓글 (선택 - giscus 추천)
# -----------------------------------------------
comments:
  active: giscus
  giscus:
    repo: jaedark/jaedark.github.io
    repo_id: ""       # giscus.app 에서 생성 후 입력
    category: "General"
    category_id: ""   # giscus.app 에서 생성 후 입력
    mapping: pathname
    input_position: bottom
    lang: ko
    reactions_enabled: 1

# -----------------------------------------------
# 테마
# -----------------------------------------------
theme_mode:           # light | dark | 비워두면 시스템 설정 따름

# -----------------------------------------------
# 이미지
# -----------------------------------------------
avatar: "/assets/img/avatar.png"   # 프로필 이미지 경로
img_cdn: ""

# -----------------------------------------------
# 사이드바
# -----------------------------------------------
toc: true             # 목차 자동 생성

# -----------------------------------------------
# 페이지네이션
# -----------------------------------------------
paginate: 10

# -----------------------------------------------
# Jekyll 기본 설정 (건드리지 않아도 됨)
# -----------------------------------------------
plugins:
  - jekyll-paginate
  - jekyll-seo-tag
  - jekyll-archives
  - jekyll-sitemap
  - jekyll-include-cache

markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/
